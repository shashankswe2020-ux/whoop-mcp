name: Feature request
description: Suggest an idea or enhancement for whoop-ai-mcp.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem and the outcome you want.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What change would you like to see?
      placeholder: Describe the behavior or API/tooling change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What alternatives have you considered?
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits and how?
      placeholder: "Improves onboarding for users who ..."
    validations:
      required: true
